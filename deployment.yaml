apiVersion: apps/v1
kind: Deployment
metadata:
  name: rajesh-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rajesh-app
  template:
    metadata:
      labels:
        app: rajesh-app
    spec:
      containers:
      - name: rajesh-app
        image: rajeshbethireddy/rajesh-app:v3
        ports:
        - containerPort: 80
